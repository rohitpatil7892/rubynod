name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
        node: ['20']

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install, build, bundle, and package VSIX
        run: |
          npm ci
          npm run package:ext

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: rubynod-ai-ui-vsix-${{ matrix.os }}
          path: dist/rubynod-ai-ui-*.vsix
          if-no-files-found: error

      - name: Health check bundled server
        shell: bash
        run: |
          node extensions/rubynod-ai-ui/server/dist/server.js &
          PID=$!
          sleep 3
          curl -sf http://127.0.0.1:3847/health
          kill $PID || true
