name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"
          echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Sync version across packages
        run: node scripts/sync-version.mjs "${{ steps.ver.outputs.version }}"

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Package VS Code extension (.vsix)
        run: |
          npx --yes @vscode/vsce@latest package extensions/rubynod-ai-ui \
            --out "dist-rubynod-ai-ui-${{ steps.ver.outputs.version }}.vsix"

      - name: Generate update manifests
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/generate-update-manifest.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --commit rubynod-dev \
            --repo "${{ github.repository }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: Rubynod ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: |
            dist-rubynod-ai-ui-${{ steps.ver.outputs.version }}.vsix
            updates/latest.json
            updates/api/update/darwin/stable/rubynod-dev.json
            updates/api/update/win32/stable/rubynod-dev.json
            updates/api/update/linux/stable/rubynod-dev.json
          fail_on_unmatched_files: false

  publish-update-manifests:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Parse version from tag
        id: ver
        run: |
          TAG="${{ github.ref_name }}"
          TAG="${TAG#v}"
          echo "version=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Regenerate manifests on main
        env:
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          node scripts/generate-update-manifest.mjs \
            --version "${{ steps.ver.outputs.version }}" \
            --commit rubynod-dev \
            --repo "${{ github.repository }}"

      - name: Push manifests to main (for raw.githubusercontent.com updateUrl)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add updates/
          git diff --staged --quiet && echo "No manifest changes" && exit 0
          git commit -m "chore: update manifests for v${{ steps.ver.outputs.version }} [skip ci]"
          git push origin main
